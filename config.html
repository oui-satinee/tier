<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Price Tier Segmentation</title>
<style>
:root {
    --bg: #f4f6f9;
    --card: #fff;
    --border: #e2e8f0;
    --text: #1a202c;
    --text-mid: #4a5568;
    --text-light: #a0aec0;
    --accent: #3182ce;
    --accent-hover: #2b6cb0;
    --success: #27ae60;
    --warning: #e67e22;
    --error: #e53e3e;
    --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    padding: 20px;
}
h2 {
    font-size: 1.1rem;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
}
.section {
    margin-bottom: 20px;
}
.section label {
    display: block;
    font-size: .78rem;
    font-weight: 600;
    color: var(--text-mid);
    text-transform: uppercase;
    letter-spacing: .3px;
    margin-bottom: 6px;
}
select, input[type="text"] {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: .88rem;
    background: #fff;
    color: var(--text);
}
select:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(49,130,206,.12);
}
.mapping-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
.mapping-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.mapping-item label {
    font-size: .72rem;
    font-weight: 600;
    color: var(--text-mid);
}
.mapping-item select {
    font-size: .82rem;
    padding: 6px 10px;
}
.status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: .82rem;
    font-weight: 600;
    margin-bottom: 16px;
}
.status-bar.ok { background: #eafaf1; color: var(--success); }
.status-bar.warn { background: #fef5e7; color: var(--warning); }
.status-bar.err { background: #fff5f5; color: var(--error); }
.status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}
.status-bar.ok .status-dot { background: var(--success); }
.status-bar.warn .status-dot { background: var(--warning); }
.status-bar.err .status-dot { background: var(--error); }
.actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
}
.btn {
    padding: 9px 20px;
    border: none;
    border-radius: var(--radius);
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--bg); color: var(--text-mid); border: 1px solid var(--border); }
.btn-secondary:hover { background: #edf2f7; }
.hint { font-size: .72rem; color: var(--text-light); margin-top: 3px; }
</style>
</head>
<body>

<h2>⚙️ Settings — Price Tier Segmentation</h2>

<div class="section">
    <label>Select Worksheet</label>
    <select id="worksheetSelect">
        <option value="">— เลือก Worksheet —</option>
    </select>
    <div class="hint">เลือก Worksheet ที่มีข้อมูล SKU ใน Dashboard</div>
</div>

<div id="statusBar" class="status-bar err" style="display:none">
    <div class="status-dot"></div>
    <span id="statusText"></span>
</div>

<div class="section" id="mappingSection" style="display:none">
    <label>Column Mapping</label>
    <div class="hint" style="margin-bottom:10px">ระบุ column ใน Worksheet ที่ตรงกับแต่ละ field — ระบบ auto-detect อัตโนมัติ แต่คุณสามารถแก้ไขได้</div>
    <div class="mapping-grid" id="mappingGrid"></div>
</div>

<div class="actions">
    <button class="btn btn-secondary" onclick="cancelConfig()">Cancel</button>
    <button class="btn btn-primary" id="saveBtn" onclick="saveConfig()" disabled>💾 Save</button>
</div>

<script src="./config.js"></script>
</body>
</html>
